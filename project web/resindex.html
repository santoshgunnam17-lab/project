<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My_threes_kitchen Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <h2 class="logo">🍴 My_threes_kitchen Restaurant</h2>
  <nav>
    <a href="#menu">Menu</a>
    <a href="#order">Order</a>
    <a href="#historySection">History</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Delicious Food, Fast Service</h1>
  <p>Order your favorite meals anytime!</p>
  <a href="#menu" class="btn">See Menu</a>
</section>

<!-- MENU -->
<section id="menu" class="section">
  <h2>Our Menu</h2>

  <div class="menu-container">
    <div class="card">
      <img src="pizza.png">
      <h3>Pizza</h3>
      <p>₹199</p>
    </div>

    <div class="card">
      <img src="burger.png">
      <h3>Burger</h3>
      <p>₹149</p>
    </div>

    <div class="card">
      <img src="biryani.png">
      <h3>Biryani</h3>
      <p>₹249</p>
    </div>

    <div class="card">
      <img src="drink.png">
      <h3>Drink</h3>
      <p>₹49</p>
    </div>
  </div>
  <br>
  <a href="#order" class="btn">Place order</a>
</section>

<!-- ORDER -->
<section id="order" class="section">
  <h2>Place Your Order</h2>

  <form class="order-form" onsubmit="saveOrder(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="tel" id="phone" placeholder="Mobile Number" required>
    <input type="text" placeholder="Delivery Address" required>

    <select id="item" required>
      <option value="">Select Item</option>
      <option value="Pizza|199">Pizza - ₹199</option>
      <option value="Burger|149">Burger - ₹149</option>
      <option value="Biryani|249">Chicken Biryani - ₹249</option>
      <option value="Drink|49">Cold Drink - ₹49</option>
    </select>

    <input type="number" id="qty" placeholder="Quantity" min="1" required>

    <button type="button" class="btn" onclick="calculateBill()">💰 Calculate Bill</button>

    <h3 id="totalBill">Total Bill: ₹0</h3>

    <button type="submit" class="btn">✅ Confirm Order</button>
  </form>
</section>

<!-- ORDER HISTORY -->
<section id="historySection" class="section">
  <h2>📜 Order History</h2>

  <button class="btn clear-btn" onclick="clearHistory()">🗑 Clear History</button>

  <div id="history"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 My_threes_kitchen Restaurant</p>
</footer>

<!-- JAVASCRIPT -->
<script>
function calculateBill() {
  let item = document.getElementById("item").value;
  let qty = document.getElementById("qty").value;

  if (item === "" || qty === "") {
    alert("Select item & quantity");
    return;
  }

  let price = item.split("|")[1];
  let total = price * qty;

  document.getElementById("totalBill").innerText =
    "Total Bill: ₹" + total;
}

function saveOrder(event) {
  event.preventDefault();

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  let itemData = document.getElementById("item").value.split("|");
  let item = itemData[0];
  let price = itemData[1];

  let qty = document.getElementById("qty").value;
  let total = price * qty;

  let order = { name, phone, item, qty, total };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);

  localStorage.setItem("orders", JSON.stringify(orders));

  displayOrders();

  document.querySelector("form").reset();
  document.getElementById("totalBill").innerText = "Total Bill: ₹0";
}

function displayOrders() {
  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  let historyDiv = document.getElementById("history");

  historyDiv.innerHTML = "";

  orders.forEach(o => {
    historyDiv.innerHTML += `
      <div class="card">
        <p><b>${o.name}</b></p>
        <p>${o.item} × ${o.qty}</p>
        <p>Total: ₹${o.total}</p>
      </div>
    `;
  });
}

function clearHistory() {
  if (confirm("Are you sure you want to clear all orders?")) {
    localStorage.removeItem("orders");
    displayOrders();
  }
}

displayOrders();
</script>

</body>
</html>
